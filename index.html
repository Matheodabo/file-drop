<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Drop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      max-width: 700px;
      margin: 0 auto 1.5rem;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .tabs {
      max-width: 700px;
      margin: 0 auto 1.5rem;
      display: flex;
      gap: 0.5rem;
    }

    .tab-btn {
      flex: 1;
      padding: 0.6rem;
      border-radius: 8px;
      border: 1px solid #2d3148;
      background: transparent;
      color: #718096;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: #1a1d27;
      border-color: #4f5aff;
      color: #fff;
    }

    #file-list {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .file-card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      transition: border-color 0.15s;
    }

    .file-card:hover { border-color: #4f5aff; }

    .file-info { flex: 1; min-width: 0; }

    .file-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-desc {
      font-size: 0.8rem;
      color: #718096;
      margin-top: 0.2rem;
    }

    .file-date {
      font-size: 0.75rem;
      color: #4a5568;
      margin-top: 0.15rem;
    }

    .file-icon {
      font-size: 1.6rem;
      flex-shrink: 0;
    }

    .dl-btn {
      flex-shrink: 0;
      background: #4f5aff;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 0.5rem 1.1rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.15s;
    }

    .dl-btn:hover { background: #3d47e8; }

    #loading, #error {
      text-align: center;
      color: #718096;
      padding: 3rem 0;
    }

    #error { color: #fc8181; }

    /* Submit tab */
    #submit-panel {
      max-width: 700px;
      margin: 0 auto;
      display: none;
      flex-direction: column;
      gap: 1rem;
    }

    #submit-panel input, #submit-panel textarea {
      width: 100%;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      padding: 0.75rem 1rem;
      outline: none;
      font-family: 'Courier New', monospace;
      transition: border-color 0.15s;
    }

    #submit-panel input:focus, #submit-panel textarea:focus {
      border-color: #4f5aff;
    }

    #submit-panel textarea {
      min-height: 320px;
      resize: vertical;
    }

    #submit-btn {
      background: #4f5aff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #submit-btn:hover { background: #3d47e8; }
    #submit-btn:disabled { background: #2d3148; cursor: not-allowed; }

    #submit-status {
      text-align: center;
      font-size: 0.9rem;
      padding: 0.5rem;
      border-radius: 7px;
      display: none;
    }
  </style>
</head>
<body>

<!-- Password Gate -->
<div id="gate" style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:1rem;">
  <div style="background:#1a1d27;border:1px solid #2d3148;border-radius:12px;padding:2.5rem 2rem;text-align:center;width:100%;max-width:340px;">
    <div style="font-size:2rem;margin-bottom:0.75rem;">🔒</div>
    <h2 style="color:#fff;font-size:1.2rem;margin-bottom:1.5rem;">Enter Password</h2>
    <input id="pw" type="password" placeholder="Password"
      style="width:100%;padding:0.6rem 0.9rem;border-radius:7px;border:1px solid #2d3148;background:#0f1117;color:#e2e8f0;font-size:1rem;margin-bottom:1rem;outline:none;" />
    <br/>
    <button onclick="checkPw()"
      style="width:100%;background:#4f5aff;color:#fff;border:none;border-radius:7px;padding:0.6rem;font-size:1rem;font-weight:600;cursor:pointer;">
      Enter
    </button>
    <div id="pw-error" style="color:#fc8181;font-size:0.85rem;margin-top:0.75rem;display:none;">Incorrect password.</div>
  </div>
</div>

<!-- Main Content -->
<div id="main" style="display:none;">

  <header>
    <h1>File Drop</h1>
  </header>

  <div id="file-list">
    <div id="loading">Loading files...</div>
  </div>

</div>

<script>
  const GITHUB_TOKEN = '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';
  const REPO = 'Matheodabo/file-drop';

  const icons = { pdf: '📄', txt: '📝', html: '🌐', default: '📁' };

  function getIcon(filename) {
    const ext = filename.split('.').pop().toLowerCase();
    return icons[ext] || icons.default;
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'files') || (i === 1 && tab === 'submit'));
    });
    document.getElementById('file-list').style.display = tab === 'files' ? 'flex' : 'none';
    document.getElementById('submit-panel').style.display = tab === 'submit' ? 'flex' : 'none';
  }

  async function loadFiles() {
    const container = document.getElementById('file-list');
    try {
      const res = await fetch('files.json?_=' + Date.now());
      if (!res.ok) throw new Error('Could not load file list');
      const files = await res.json();

      container.innerHTML = '';

      // Web tools
      const tools = [
        { label: 'Vinder Group Website', description: 'Local website simulator', icon: '🌐', url: 'vinder/index.html' },
      ];
      tools.forEach(t => {
        const card = document.createElement('div');
        card.className = 'file-card';
        card.innerHTML = `
          <div class="file-icon">${t.icon}</div>
          <div class="file-info">
            <div class="file-name">${t.label}</div>
            ${t.description ? `<div class="file-desc">${t.description}</div>` : ''}
          </div>
          <a class="dl-btn" href="${t.url}" target="_blank" style="background:#10b981;">Open</a>
        `;
        container.appendChild(card);
      });

      if (files.length === 0 && tools.length === 0) {
        container.innerHTML = '<div id="loading">No files available yet.</div>';
        return;
      }

      files.forEach(f => {
        const card = document.createElement('div');
        card.className = 'file-card';
        card.innerHTML = `
          <div class="file-icon">${getIcon(f.name)}</div>
          <div class="file-info">
            <div class="file-name">${f.label || f.name}</div>
            ${f.description ? `<div class="file-desc">${f.description}</div>` : ''}
            ${f.date ? `<div class="file-date">${f.date}</div>` : ''}
          </div>
          <div style="display:flex;gap:0.5rem;align-items:center;">
            <a class="dl-btn" href="files/${f.name}" download="${f.name}">Download</a>
            <button onclick="deleteFile('${f.name}', this)" title="Delete" style="background:transparent;border:1px solid #3a1a1a;border-radius:7px;color:#fc8181;font-size:1rem;padding:0.45rem 0.6rem;cursor:pointer;transition:background 0.15s;" onmouseover="this.style.background='#3a1a1a'" onmouseout="this.style.background='transparent'">🗑</button>
          </div>
        `;
        container.appendChild(card);
      });
    } catch (e) {
      container.innerHTML = `<div id="error">Error loading files: ${e.message}</div>`;
    }
  }

  async function submitCode() {
    const filename = document.getElementById('filename-input').value.trim();
    const code = document.getElementById('code-input').value;
    const status = document.getElementById('submit-status');
    const btn = document.getElementById('submit-btn');

    if (!filename) { showStatus('Please enter a filename.', 'error'); return; }
    if (!code.trim()) { showStatus('Please paste some code first.', 'error'); return; }

    const fullName = filename.endsWith('.txt') ? filename : filename + '.txt';
    const path = `files/${fullName}`;
    const content = btoa(unescape(encodeURIComponent(code)));

    btn.disabled = true;
    showStatus('Uploading...', 'info');

    try {
      // Check if file already exists (need SHA to update)
      let sha = null;
      const check = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
        headers: { Authorization: `Bearer ${GITHUB_TOKEN}` }
      });
      if (check.ok) {
        const existing = await check.json();
        sha = existing.sha;
      }

      const body = {
        message: `Upload ${fullName}`,
        content,
        ...(sha ? { sha } : {})
      };

      const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
        method: 'PUT',
        headers: {
          Authorization: `Bearer ${GITHUB_TOKEN}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });

      if (res.ok) {
        showStatus(`✓ "${fullName}" uploaded successfully!`, 'success');
        document.getElementById('filename-input').value = '';
        document.getElementById('code-input').value = '';
      } else {
        const err = await res.json();
        showStatus('Upload failed: ' + (err.message || res.status), 'error');
      }
    } catch (e) {
      showStatus('Upload failed: ' + e.message, 'error');
    }

    btn.disabled = false;
  }

  async function deleteFile(filename, btn) {
    if (!confirm(`Delete "${filename}"?`)) return;
    btn.disabled = true;
    btn.textContent = '...';
    try {
      const path = `files/${filename}`;
      const check = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
        headers: { Authorization: `Bearer ${GITHUB_TOKEN}` }
      });
      if (!check.ok) throw new Error('File not found on GitHub');
      const { sha } = await check.json();

      const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: `Delete ${filename}`, sha })
      });

      if (res.ok) {
        btn.closest('.file-card').remove();
      } else {
        const err = await res.json();
        alert('Delete failed: ' + (err.message || res.status));
        btn.disabled = false;
        btn.textContent = '🗑';
      }
    } catch (e) {
      alert('Delete failed: ' + e.message);
      btn.disabled = false;
      btn.textContent = '🗑';
    }
  }

  function showStatus(msg, type) {
    const el = document.getElementById('submit-status');
    el.textContent = msg;
    el.style.display = 'block';
    el.style.background = type === 'success' ? '#1a3a2a' : type === 'error' ? '#3a1a1a' : '#1a1d27';
    el.style.color = type === 'success' ? '#6ee7b7' : type === 'error' ? '#fc8181' : '#718096';
  }

  function checkPw() {
    const val = document.getElementById('pw').value;
    if (val === 'Vinder2025') {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('main').style.display = 'block';
      loadFiles();
    } else {
      document.getElementById('pw-error').style.display = 'block';
    }
  }

  document.getElementById('pw').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPw();
  });
</script>

</body>
</html>
