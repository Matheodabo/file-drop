<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Drop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      max-width: 700px;
      margin: 0 auto 2.5rem;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }

    header p {
      margin-top: 0.5rem;
      color: #718096;
      font-size: 0.95rem;
    }

    #file-list {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .file-card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      transition: border-color 0.15s;
    }

    .file-card:hover { border-color: #4f5aff; }

    .file-info { flex: 1; min-width: 0; }

    .file-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-desc {
      font-size: 0.8rem;
      color: #718096;
      margin-top: 0.2rem;
    }

    .file-date {
      font-size: 0.75rem;
      color: #4a5568;
      margin-top: 0.15rem;
    }

    .file-icon {
      font-size: 1.6rem;
      flex-shrink: 0;
    }

    .dl-btn {
      flex-shrink: 0;
      background: #4f5aff;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 0.5rem 1.1rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.15s;
    }

    .dl-btn:hover { background: #3d47e8; }

    #loading, #error {
      text-align: center;
      color: #718096;
      padding: 3rem 0;
    }

    #error { color: #fc8181; }
  </style>
</head>
<body>

<header>
  <h1>File Drop</h1>
  <p>Click a file to download. Rename .txt files to the correct extension after saving.</p>
</header>

<div id="file-list">
  <div id="loading">Loading files...</div>
</div>

<script>
  const icons = {
    pdf: '📄',
    txt: '📝',
    default: '📁'
  };

  function getIcon(filename) {
    const ext = filename.split('.').pop().toLowerCase();
    return icons[ext] || icons.default;
  }

  async function loadFiles() {
    const container = document.getElementById('file-list');
    try {
      const res = await fetch('files.json?_=' + Date.now());
      if (!res.ok) throw new Error('Could not load file list');
      const files = await res.json();

      if (files.length === 0) {
        container.innerHTML = '<div id="loading">No files available yet.</div>';
        return;
      }

      container.innerHTML = '';
      files.forEach(f => {
        const card = document.createElement('div');
        card.className = 'file-card';
        card.innerHTML = `
          <div class="file-icon">${getIcon(f.name)}</div>
          <div class="file-info">
            <div class="file-name">${f.label || f.name}</div>
            ${f.description ? `<div class="file-desc">${f.description}</div>` : ''}
            ${f.date ? `<div class="file-date">${f.date}</div>` : ''}
          </div>
          <a class="dl-btn" href="files/${f.name}" download="${f.name}">Download</a>
        `;
        container.appendChild(card);
      });
    } catch (e) {
      container.innerHTML = `<div id="error">Error loading files: ${e.message}</div>`;
    }
  }

  loadFiles();
</script>

</body>
</html>
